<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    h2 {
      text-transform: capitalize;
    }

    h2 {
      text-transform: capitalize;
    }
    #main {
      height: 300px;
      width: 500px;
      background-color: aquamarine;
      text-align: center;
      align-content: center;
    }
    #main h1 {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 300;
      font-size: 5rem;
      user-select: none;
    }
    #choosefile {
      height: 300px;
      width: 500px;
      background-color: rgb(65, 59, 51);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #fileinput {
      display: none;
    }
    #btn {
      padding: 12px 22px;
      background-color: rgb(41, 143, 114);
      color: white;
      font-weight: 600;
      border-radius: 7px;
    }
    #btn:hover {
      background-color: rgb(24, 79, 65);
    }
    #userForm {
      margin-top: 10px;
      /* padding: 5px; */
    }
    .detail {
      margin: 5px;
    }
    #subBtn {
      margin: 10px 0 0 60px;
    }
    .card {
      max-width: 300px;
      padding: 40px;
      margin: 20px;
      border-radius: 10px;
      border: 2px solid black;
      display: inline-block;
    }
    .profile {
      height: 50px;
      width: 50px;
      /* background-color: red; */
      border-radius: 50%;
      overflow: hidden;
    }
    .profile img{
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
  <body>
    <h1>This is Ayan khan</h1>

    <input type="text" placeholder="Name" /> <br />
    <input type="text" placeholder="Address" id="Address" />

    <h2 id="device">Select Your Device</h2>
    <select>
      <option selected disabled>Choose Your Device</option>
      <option value="samsung">Samsung</option>
      <option value="vivo">Vivo</option>
      <option value="oppo">Oppo</option>
      <option value="moto">Motorola</option>
      <option value="mi">Realme</option>
    </select>

    <div id="main">
      <h1 id="headh2">A</h1>
    </div>

    <div id="choosefile">
      <input type="file" id="fileinput" />
      <div id="btn">Upload File</div>
    </div>

    <form action="" id="userForm">
      <input type="text" placeholder="name" class="detail" /> <br />
      <input type="number" placeholder="age" class="detail" /> <br />
      <input type="email" placeholder="E-mail" class="detail" /> <br />
      <input type="text" placeholder="profile-pic" class="detail" /> <br />
      <input type="submit" id="subBtn" class="detail" />
    </form>

    <div class="card">
      <div class="profile">
        <img src="https://images.unsplash.com/photo-1770988042803-904bb99911ff?q=80&w=387&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
      </div>
      <h3>Ayankhan</h3>
      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Expedita quos
        aliquam pariatur minima non vero consectetur ullam dicta consequuntur?
        Officia!
      </p>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
